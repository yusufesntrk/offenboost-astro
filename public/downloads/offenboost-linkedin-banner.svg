<svg xmlns="http://www.w3.org/2000/svg" width="1584" height="396" viewBox="0 0 1584 396">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0f1e"/>
      <stop offset="100%" style="stop-color:#0d1a3a"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0073E6;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#0073E6;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#0073E6;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1584" height="396" fill="url(#bg)"/>

  <!-- Subtle glow center -->
  <ellipse cx="792" cy="198" rx="600" ry="250" fill="url(#glow)"/>

  <!-- Accent line top -->
  <rect x="0" y="0" width="1584" height="3" fill="#0073E6"/>

  <!-- Main text -->
  <text x="792" y="168" font-family="Inter, system-ui, sans-serif" font-weight="800" font-size="64" fill="#ffffff" text-anchor="middle" letter-spacing="-1">
    Kein Blabla.
  </text>

  <text x="792" y="256" font-family="Inter, system-ui, sans-serif" font-weight="400" font-size="40" fill="#8ba8cc" text-anchor="middle" letter-spacing="-0.5">
    Sales-Systeme für Personalvermittler &amp; Recruiting-Agenturen,
  </text>

  <text x="792" y="308" font-family="Inter, system-ui, sans-serif" font-weight="400" font-size="40" fill="#8ba8cc" text-anchor="middle" letter-spacing="-0.5">
    die wirklich funktionieren.
  </text>
</svg>
